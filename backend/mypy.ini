[mypy]
# NexusTrader — mypy configuration
# Data-science / finance libraries ship without py.typed markers or stub packages.
# Suppressing missing-import errors for these is the standard, accepted approach.
python_version = 3.11
ignore_missing_imports = True

# Enforce type checks on annotated functions; skip unannotated ones by default
check_untyped_defs = False
disallow_untyped_decorators = False

# Per-module overrides: stricter checking on our own code
[mypy-app.*]
ignore_missing_imports = True
warn_return_any = False

# Known third-party libraries without stubs — suppress individually for clarity
[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-prophet.*]
ignore_missing_imports = True

[mypy-tensorflow.*]
ignore_missing_imports = True

[mypy-ta.*]
ignore_missing_imports = True

[mypy-ccxt.*]
ignore_missing_imports = True

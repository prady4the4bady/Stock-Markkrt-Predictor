# Render deployment — uses Docker for Node+Python in a single container
services:
  - type: web
    name: nexustrader
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexustrader-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: FRONTEND_URL
        value: https://nexustrader.onrender.com
      - key: CORS_ORIGINS
        value: https://nexustrader.onrender.com
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PYTHONUTF8
        value: "1"

databases:
  - name: nexustrader-db
    databaseName: nexustrader
    plan: free

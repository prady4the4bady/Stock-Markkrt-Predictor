<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 490" width="500" height="490" role="img" aria-label="NexusTrader">
  <defs>
    <!-- Glow filters: small / medium / large -->
    <filter id="gs" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Hex background: dark green-tinted radial -->
    <radialGradient id="hexBg" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#0d2010"/>
      <stop offset="55%"  stop-color="#0b0c14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>

    <!-- Wordmark gradient: lime → teal -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>

    <!-- Trend-line gradient: fades in from dim teal to bright lime -->
    <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0.25"/>
      <stop offset="35%"  stop-color="#00ff88" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="1"/>
    </linearGradient>

    <!-- Centre ambient glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8ff00" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to hexagon -->
    <clipPath id="hexClip">
      <polygon points="250,40 397,125 397,295 250,380 103,295 103,125"/>
    </clipPath>
  </defs>

  <!-- ── Canvas ─────────────────────────────────────────── -->
  <rect width="500" height="490" fill="#0a0a0f"/>

  <!-- ── Hex fill + borders ─────────────────────────────── -->
  <!-- Hex: centre (250,210), circumradius R=170 -->
  <!-- Vertices: Top(250,40) TR(397,125) BR(397,295) Bot(250,380) BL(103,295) TL(103,125) -->
  <polygon points="250,40 397,125 397,295 250,380 103,295 103,125"
           fill="url(#hexBg)"/>
  <polygon points="250,40 397,125 397,295 250,380 103,295 103,125"
           fill="none" stroke="#c8ff00" stroke-width="3" stroke-opacity="0.45"
           filter="url(#gm)"/>
  <polygon points="250,40 397,125 397,295 250,380 103,295 103,125"
           fill="none" stroke="#c8ff00" stroke-width="1.3" stroke-opacity="0.88"/>

  <!-- Inner hex (flat-top, R=115, dashed) -->
  <polygon points="365,210 307,110 193,110 135,210 193,310 307,310"
           fill="none" stroke="#00d4aa" stroke-width="0.7" stroke-opacity="0.18"
           stroke-dasharray="5,9"/>

  <!-- ── Subtle grid ─────────────────────────────────────── -->
  <g clip-path="url(#hexClip)" stroke="#c8ff00" stroke-width="0.5" opacity="0.042">
    <line x1="103" y1="168" x2="397" y2="168"/>
    <line x1="103" y1="210" x2="397" y2="210"/>
    <line x1="103" y1="252" x2="397" y2="252"/>
    <line x1="180" y1="40"  x2="180" y2="380"/>
    <line x1="250" y1="40"  x2="250" y2="380"/>
    <line x1="320" y1="40"  x2="320" y2="380"/>
  </g>

  <!-- ── Ghost candlesticks ─────────────────────────────── -->
  <g clip-path="url(#hexClip)" opacity="0.13">
    <rect x="127" y="252" width="12" height="34" rx="1" fill="#ff4466"/>
    <line x1="133" y1="244" x2="133" y2="252" stroke="#ff4466" stroke-width="1.5"/>
    <line x1="133" y1="286" x2="133" y2="298" stroke="#ff4466" stroke-width="1.5"/>

    <rect x="152" y="230" width="12" height="30" rx="1" fill="#00d4aa"/>
    <line x1="158" y1="220" x2="158" y2="230" stroke="#00d4aa" stroke-width="1.5"/>
    <line x1="158" y1="260" x2="158" y2="272" stroke="#00d4aa" stroke-width="1.5"/>

    <rect x="177" y="224" width="12" height="26" rx="1" fill="#ff4466"/>
    <line x1="183" y1="215" x2="183" y2="224" stroke="#ff4466" stroke-width="1.5"/>
    <line x1="183" y1="250" x2="183" y2="261" stroke="#ff4466" stroke-width="1.5"/>

    <rect x="202" y="208" width="12" height="32" rx="1" fill="#00d4aa"/>
    <line x1="208" y1="198" x2="208" y2="208" stroke="#00d4aa" stroke-width="1.5"/>
    <line x1="208" y1="240" x2="208" y2="252" stroke="#00d4aa" stroke-width="1.5"/>

    <rect x="277" y="178" width="12" height="36" rx="1" fill="#c8ff00"/>
    <line x1="283" y1="166" x2="283" y2="178" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="283" y1="214" x2="283" y2="226" stroke="#c8ff00" stroke-width="1.5"/>

    <rect x="302" y="161" width="12" height="32" rx="1" fill="#c8ff00"/>
    <line x1="308" y1="150" x2="308" y2="161" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="308" y1="193" x2="308" y2="205" stroke="#c8ff00" stroke-width="1.5"/>

    <rect x="327" y="143" width="12" height="40" rx="1" fill="#c8ff00"/>
    <line x1="333" y1="131" x2="333" y2="143" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="333" y1="183" x2="333" y2="196" stroke="#c8ff00" stroke-width="1.5"/>

    <rect x="352" y="130" width="12" height="34" rx="1" fill="#c8ff00"/>
    <line x1="358" y1="120" x2="358" y2="130" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="358" y1="164" x2="358" y2="176" stroke="#c8ff00" stroke-width="1.5"/>
  </g>

  <!-- ── Centre ambient halo ────────────────────────────── -->
  <circle cx="250" cy="210" r="95" fill="url(#coreGlow)" filter="url(#gl)"/>

  <!-- ── Cross-connections (lattice web) ───────────────── -->
  <g clip-path="url(#hexClip)" stroke="#00ff88" stroke-width="0.7" opacity="0.16">
    <line x1="250" y1="90"  x2="354" y2="270"/>
    <line x1="354" y1="150" x2="146" y2="270"/>
    <line x1="146" y1="150" x2="354" y2="270"/>
    <line x1="250" y1="330" x2="354" y2="150"/>
    <line x1="250" y1="90"  x2="146" y2="270"/>
    <line x1="146" y1="150" x2="250" y2="330"/>
  </g>

  <!-- Outer node perimeter (dashed ring hex) -->
  <!-- Outer nodes at R=120: Top(250,90) TR(354,150) BR(354,270) Bot(250,330) BL(146,270) TL(146,150) -->
  <polygon points="250,90 354,150 354,270 250,330 146,270 146,150"
           fill="none" stroke="#c8ff00" stroke-width="0.75" stroke-opacity="0.22"
           stroke-dasharray="4,8"/>

  <!-- ── Centre → outer-node spokes ────────────────────── -->
  <g stroke="#00d4aa" stroke-width="1.4" opacity="0.55" filter="url(#gs)">
    <line x1="250" y1="210" x2="250" y2="90"/>
    <line x1="250" y1="210" x2="354" y2="150"/>
    <line x1="250" y1="210" x2="354" y2="270"/>
    <line x1="250" y1="210" x2="250" y2="330"/>
    <line x1="250" y1="210" x2="146" y2="270"/>
    <line x1="250" y1="210" x2="146" y2="150"/>
  </g>

  <!-- ── Centre → mid-ring spokes ──────────────────────── -->
  <!-- Mid-ring nodes at R=68: Top(250,142) TR(309,176) BR(309,244) Bot(250,278) BL(191,244) TL(191,176) -->
  <g stroke="#00ff88" stroke-width="0.85" opacity="0.28">
    <line x1="250" y1="210" x2="250" y2="142"/>
    <line x1="250" y1="210" x2="309" y2="176"/>
    <line x1="250" y1="210" x2="309" y2="244"/>
    <line x1="250" y1="210" x2="250" y2="278"/>
    <line x1="250" y1="210" x2="191" y2="244"/>
    <line x1="250" y1="210" x2="191" y2="176"/>
  </g>

  <!-- ── Ascending trend line (passes through centre node) -->
  <!-- Slope = -166/267; at x=250: y = 296 + 138×(-0.6217) ≈ 210 ✓ -->
  <polyline points="112,296 163,264 215,232 250,210 287,187 334,158 379,130"
            fill="none" stroke="url(#trendGrad)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            clip-path="url(#hexClip)"
            filter="url(#gs)"/>
  <!-- Arrow head (upper-right) -->
  <polygon points="379,130 364,132 370,143" fill="#c8ff00" filter="url(#gm)"/>

  <!-- ── Outer-ring nodes (R=120) ──────────────────────── -->
  <g filter="url(#gs)">
    <circle cx="250" cy="90"  r="8.5" fill="#0a0a0f"/>
    <circle cx="250" cy="90"  r="8.5" fill="none" stroke="#00d4aa" stroke-width="2"/>
    <circle cx="250" cy="90"  r="3.5" fill="#00d4aa"/>

    <circle cx="354" cy="150" r="8.5" fill="#0a0a0f"/>
    <circle cx="354" cy="150" r="8.5" fill="none" stroke="#c8ff00" stroke-width="2"/>
    <circle cx="354" cy="150" r="3.5" fill="#c8ff00"/>

    <circle cx="354" cy="270" r="8.5" fill="#0a0a0f"/>
    <circle cx="354" cy="270" r="8.5" fill="none" stroke="#00d4aa" stroke-width="2"/>
    <circle cx="354" cy="270" r="3.5" fill="#00d4aa"/>

    <circle cx="250" cy="330" r="8.5" fill="#0a0a0f"/>
    <circle cx="250" cy="330" r="8.5" fill="none" stroke="#c8ff00" stroke-width="2"/>
    <circle cx="250" cy="330" r="3.5" fill="#c8ff00"/>

    <circle cx="146" cy="270" r="8.5" fill="#0a0a0f"/>
    <circle cx="146" cy="270" r="8.5" fill="none" stroke="#00d4aa" stroke-width="2"/>
    <circle cx="146" cy="270" r="3.5" fill="#00d4aa"/>

    <circle cx="146" cy="150" r="8.5" fill="#0a0a0f"/>
    <circle cx="146" cy="150" r="8.5" fill="none" stroke="#c8ff00" stroke-width="2"/>
    <circle cx="146" cy="150" r="3.5" fill="#c8ff00"/>
  </g>

  <!-- ── Mid-ring nodes (R=68) ─────────────────────────── -->
  <g filter="url(#gs)" opacity="0.72">
    <circle cx="250" cy="142" r="4.5" fill="#00ff88"/>
    <circle cx="309" cy="176" r="4.5" fill="#00ff88"/>
    <circle cx="309" cy="244" r="4.5" fill="#00ff88"/>
    <circle cx="250" cy="278" r="4.5" fill="#00ff88"/>
    <circle cx="191" cy="244" r="4.5" fill="#00ff88"/>
    <circle cx="191" cy="176" r="4.5" fill="#00ff88"/>
  </g>

  <!-- ── Centre nexus node ──────────────────────────────── -->
  <!-- Ambient halo, 3 rings, dark core, bright inner dot -->
  <circle cx="250" cy="210" r="50" fill="#c8ff00" fill-opacity="0.03" filter="url(#gl)"/>
  <circle cx="250" cy="210" r="38" fill="none" stroke="#c8ff00" stroke-width="0.9" stroke-opacity="0.22" filter="url(#gm)"/>
  <circle cx="250" cy="210" r="28" fill="none" stroke="#c8ff00" stroke-width="1.4" stroke-opacity="0.50" filter="url(#gs)"/>
  <circle cx="250" cy="210" r="17" fill="#090e09" stroke="#c8ff00" stroke-width="2.2"/>
  <circle cx="250" cy="210" r="17" fill="#c8ff00" fill-opacity="0.10" filter="url(#gs)"/>
  <circle cx="250" cy="210" r="9"  fill="#c8ff00" filter="url(#gl)"/>
  <circle cx="250" cy="210" r="4"  fill="#ffffff"/>

  <!-- ── Hex corner tick marks ──────────────────────────── -->
  <g stroke="#c8ff00" stroke-width="1.8" fill="none" stroke-opacity="0.60">
    <polyline points="241,48 250,40 259,48"/>
    <polyline points="390,133 397,125 390,118"/>
    <polyline points="390,302 397,295 390,288"/>
    <polyline points="241,372 250,380 259,372"/>
    <polyline points="110,288 103,295 110,302"/>
    <polyline points="110,118 103,125 110,133"/>
  </g>

  <!-- ── Circuit-trace dots on hex edge midpoints ─────── -->
  <g fill="#00d4aa" stroke="#00d4aa" stroke-width="1" opacity="0.44" filter="url(#gs)">
    <circle cx="323" cy="82" r="2.5"/>
    <line x1="315" y1="77" x2="323" y2="82"/>

    <circle cx="397" cy="210" r="2.5"/>
    <line x1="397" y1="199" x2="397" y2="210"/>

    <circle cx="323" cy="338" r="2.5"/>
    <line x1="331" y1="343" x2="323" y2="338"/>

    <circle cx="177" cy="338" r="2.5"/>
    <line x1="169" y1="343" x2="177" y2="338"/>

    <circle cx="103" cy="210" r="2.5"/>
    <line x1="103" y1="221" x2="103" y2="210"/>

    <circle cx="177" cy="82" r="2.5"/>
    <line x1="185" y1="77" x2="177" y2="82"/>
  </g>

  <!-- ── Separator ──────────────────────────────────────── -->
  <line x1="140" y1="406" x2="360" y2="406" stroke="#c8ff00" stroke-width="0.5" stroke-opacity="0.30"/>
  <circle cx="140" cy="406" r="2" fill="#c8ff00" fill-opacity="0.38"/>
  <circle cx="360" cy="406" r="2" fill="#c8ff00" fill-opacity="0.38"/>

  <!-- ── NEXUSTRADER wordmark ───────────────────────────── -->
  <text
    x="250" y="436"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="28" font-weight="700"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#gs)">NEXUSTRADER</text>

  <!-- ── Tagline ────────────────────────────────────────── -->
  <text
    x="250" y="463"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="10.5"
    fill="#00d4aa"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.72">AI · PREDICT · TRADE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="NexusTrader">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="44%" r="52%">
      <stop offset="0%"   stop-color="#0d2010"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8ff00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tr" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8ff00"/>
    </linearGradient>
    <clipPath id="hx">
      <polygon points="32,4 57,18 57,46 32,60 7,46 7,18"/>
    </clipPath>
  </defs>

  <!-- Hex: centre (32,32), R=28 -->
  <!-- Vertices: Top(32,4) TR(56.2,18)≈(57,18) BR(57,46) Bot(32,60) BL(7,46) TL(7,18) -->
  <polygon points="32,4 57,18 57,46 32,60 7,46 7,18" fill="url(#bg)"/>
  <!-- Hex glow border -->
  <polygon points="32,4 57,18 57,46 32,60 7,46 7,18"
           fill="none" stroke="#c8ff00" stroke-width="2.2" stroke-opacity="0.50"
           filter="url(#g)"/>
  <!-- Hex crisp border -->
  <polygon points="32,4 57,18 57,46 32,60 7,46 7,18"
           fill="none" stroke="#c8ff00" stroke-width="1" stroke-opacity="0.90"/>

  <!-- Centre ambient glow -->
  <circle cx="32" cy="32" r="16" fill="url(#cg)" filter="url(#gc)"/>

  <!-- Cross connections -->
  <g clip-path="url(#hx)" stroke="#00ff88" stroke-width="0.6" opacity="0.18">
    <line x1="32" y1="12" x2="46" y2="43"/>
    <line x1="46" y1="21" x2="18" y2="43"/>
    <line x1="18" y1="21" x2="46" y2="43"/>
  </g>

  <!-- Centre → outer-node spokes -->
  <!-- Outer nodes at R=20: Top(32,12) TR(49.3,22)≈(49,22) BR(49,42) Bot(32,52) BL(15,42) TL(15,22) -->
  <g stroke="#00d4aa" stroke-width="0.9" opacity="0.55" filter="url(#g)">
    <line x1="32" y1="32" x2="32" y2="12"/>
    <line x1="32" y1="32" x2="49" y2="22"/>
    <line x1="32" y1="32" x2="49" y2="42"/>
    <line x1="32" y1="32" x2="32" y2="52"/>
    <line x1="32" y1="32" x2="15" y2="42"/>
    <line x1="32" y1="32" x2="15" y2="22"/>
  </g>

  <!-- Trend line (through centre: slope ≈ -0.622, passes through (32,32)) -->
  <!-- Points: (9,46) → (32,32) → (55,18) -->
  <polyline points="9,46 21,39 32,32 43,25 55,18"
            fill="none" stroke="url(#tr)" stroke-width="1.8"
            stroke-linecap="round" clip-path="url(#hx)"
            filter="url(#g)"/>
  <!-- Arrow head -->
  <polygon points="55,18 48,19 51,25" fill="#c8ff00" filter="url(#g)"/>

  <!-- Outer ring nodes -->
  <g filter="url(#g)">
    <circle cx="32" cy="12" r="3" fill="#0a0a0f"/>
    <circle cx="32" cy="12" r="3" fill="none" stroke="#00d4aa" stroke-width="1.4"/>
    <circle cx="32" cy="12" r="1.2" fill="#00d4aa"/>

    <circle cx="49" cy="22" r="3" fill="#0a0a0f"/>
    <circle cx="49" cy="22" r="3" fill="none" stroke="#c8ff00" stroke-width="1.4"/>
    <circle cx="49" cy="22" r="1.2" fill="#c8ff00"/>

    <circle cx="49" cy="42" r="3" fill="#0a0a0f"/>
    <circle cx="49" cy="42" r="3" fill="none" stroke="#00d4aa" stroke-width="1.4"/>
    <circle cx="49" cy="42" r="1.2" fill="#00d4aa"/>

    <circle cx="32" cy="52" r="3" fill="#0a0a0f"/>
    <circle cx="32" cy="52" r="3" fill="none" stroke="#c8ff00" stroke-width="1.4"/>
    <circle cx="32" cy="52" r="1.2" fill="#c8ff00"/>

    <circle cx="15" cy="42" r="3" fill="#0a0a0f"/>
    <circle cx="15" cy="42" r="3" fill="none" stroke="#00d4aa" stroke-width="1.4"/>
    <circle cx="15" cy="42" r="1.2" fill="#00d4aa"/>

    <circle cx="15" cy="22" r="3" fill="#0a0a0f"/>
    <circle cx="15" cy="22" r="3" fill="none" stroke="#c8ff00" stroke-width="1.4"/>
    <circle cx="15" cy="22" r="1.2" fill="#c8ff00"/>
  </g>

  <!-- Centre nexus node -->
  <circle cx="32" cy="32" r="10" fill="#0a0a0f" stroke="#c8ff00" stroke-width="1.6"/>
  <circle cx="32" cy="32" r="10" fill="#c8ff00" fill-opacity="0.08" filter="url(#g)"/>
  <circle cx="32" cy="32" r="5.5" fill="#c8ff00" filter="url(#gc)"/>
  <circle cx="32" cy="32" r="2.2" fill="#ffffff"/>

  <!-- Corner ticks -->
  <g stroke="#c8ff00" stroke-width="1.2" fill="none" stroke-opacity="0.58">
    <polyline points="29,6 32,4 35,6"/>
    <polyline points="54,20 57,18 54,16"/>
    <polyline points="54,48 57,46 54,44"/>
    <polyline points="29,58 32,60 35,58"/>
    <polyline points="10,44 7,46 10,48"/>
    <polyline points="10,16 7,18 10,20"/>
  </g>
</svg>

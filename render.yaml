services:
  - type: web
    name: nexustrader
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      # Auto-generated on first deploy — never commit the actual value
      - key: JWT_SECRET_KEY
        generateValue: true
      # CORS — accepts all origins (single-server deployment)
      - key: CORS_ORIGINS
        value: "*"
      # Optional: point to Supabase PostgreSQL for persistent storage
      # Leave unset to use SQLite (fine for single-instance free tier)
      - key: DATABASE_URL
        sync: false

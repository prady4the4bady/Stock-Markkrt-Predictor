services:
  - type: web
    name: nexustrader
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      # Auto-generated secure random secret for JWT signing — never commit the actual value
      - key: SECRET_KEY
        generateValue: true
      # CORS — accepts all origins (frontend is served from same Docker container)
      - key: CORS_ORIGINS
        value: "*"
      # Supabase PostgreSQL — set DATABASE_URL in Render dashboard environment section
      - key: DATABASE_URL
        sync: false
